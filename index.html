<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: 'Quicksand', -apple-system, sans-serif; }
    h1 { font-family: 'Fredoka', sans-serif; font-size: 36px; }
    .hub-card .hub-title { font-family: 'Fredoka', sans-serif; }
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
    .hub-card {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 24px;
      padding: 36px 24px; text-align: center; cursor: pointer; transition: all 0.3s;
      text-decoration: none; color: var(--text); position: relative; overflow: hidden;
    }
    .hub-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
    .hub-card:nth-child(1)::before { background: var(--gradient-pink); }
    .hub-card:nth-child(2)::before { background: linear-gradient(135deg, #10b981, #8b5cf6); }
    .hub-card:nth-child(3)::before { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .hub-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 50px rgba(232,99,165,0.15); }
    .hub-card .hub-emoji { font-size: 52px; margin-bottom: 14px; }
    .hub-card .hub-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .hub-card .hub-desc { font-size: 13px; color: var(--text-secondary); font-family: 'Quicksand', sans-serif; }
    @media (prefers-color-scheme: dark) { .hub-card { background: rgba(42, 31, 58, 0.85); } }
  </style>
</head>
<body>
  <div style="text-align:center;margin-bottom:8px;position:relative;z-index:1">
    <h1>&#x2728; Home Hub</h1>
    <p class="subtitle" style="font-family:'Quicksand',sans-serif;font-size:14px">Everything in one place. Tap to open.</p>
  </div>

  <div class="hub-grid" style="position:relative;z-index:1">
    <a href="bills.html" class="hub-card">
      <div class="hub-emoji">&#x1F4B0;</div>
      <div class="hub-title">Bill Tracker</div>
      <div class="hub-desc">Bills, balances, forecasts, payday countdown</div>
    </a>
    <a href="chores.html" class="hub-card">
      <div class="hub-emoji">&#x1F9F9;</div>
      <div class="hub-title">Chores and Supplies</div>
      <div class="hub-desc">Cleaning schedule, supply inventory, streaks</div>
    </a>
    <a href="meals.html" class="hub-card">
      <div class="hub-emoji">&#x1F372;</div>
      <div class="hub-title">Meal Planner</div>
      <div class="hub-desc">Weekly meals, grocery list, pantry, recipes</div>
    </a>
  </div>

  <script src="sparkles.js"></script>
</body>
</html>
