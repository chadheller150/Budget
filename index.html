<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: 'Quicksand', -apple-system, sans-serif; position: relative; overflow-x: hidden; }
    h1 { font-family: 'Fredoka', sans-serif; font-size: 36px; }
    .hub-card .hub-title { font-family: 'Fredoka', sans-serif; }

    /* Sparkle canvas */
    #sparkleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .content { position: relative; z-index: 1; }

    .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
    .hub-card {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 24px;
      padding: 36px 24px; text-align: center; cursor: pointer; transition: all 0.3s;
      text-decoration: none; color: var(--text); position: relative; overflow: hidden;
    }
    .hub-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
    .hub-card:nth-child(1)::before { background: var(--gradient-pink); }
    .hub-card:nth-child(2)::before { background: linear-gradient(135deg, #10b981, #8b5cf6); }
    .hub-card:nth-child(3)::before { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .hub-card:nth-child(4)::before { background: linear-gradient(135deg, #60a5fa, #14b8a6); }
    .hub-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 50px rgba(232,99,165,0.15); }
    .hub-card .hub-emoji { font-size: 52px; margin-bottom: 14px; }
    .hub-card .hub-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .hub-card .hub-desc { font-size: 13px; color: var(--text-secondary); font-family: 'Quicksand', sans-serif; }

    @media (prefers-color-scheme: dark) {
      .hub-card { background: rgba(42, 31, 58, 0.85); }
    }
  </style>
</head>
<body>
  <canvas id="sparkleCanvas"></canvas>
  <div class="content">
    <div style="text-align:center;margin-bottom:8px">
      <h1>&#x2728; Home Hub</h1>
      <p class="subtitle" style="font-family:'Quicksand',sans-serif;font-size:14px">Everything in one place. Tap to open.</p>
    </div>

    <div class="hub-grid">
      <a href="bills.html" class="hub-card">
        <div class="hub-emoji">&#x1F4B0;</div>
        <div class="hub-title">Bill Tracker</div>
        <div class="hub-desc">Bills, balances, forecasts, payday countdown</div>
      </a>
      <a href="chores.html" class="hub-card">
        <div class="hub-emoji">&#x1F9F9;</div>
        <div class="hub-title">Chore Tracker</div>
        <div class="hub-desc">Cleaning schedule, assignments, streaks</div>
      </a>
      <a href="meals.html" class="hub-card">
        <div class="hub-emoji">&#x1F372;</div>
        <div class="hub-title">Meal Planner</div>
        <div class="hub-desc">Weekly meals, grocery list, pantry, recipes</div>
      </a>
      <a href="chores.html#supplies" class="hub-card">
        <div class="hub-emoji">&#x1F9F4;</div>
        <div class="hub-title">Supplies</div>
        <div class="hub-desc">Stock levels, reorder alerts, shopping links</div>
      </a>
    </div>
  </div>

  <script>
    // Sparkle animation
    const canvas = document.getElementById('sparkleCanvas');
    const ctx = canvas.getContext('2d');
    let sparkles = [];
    const colors = ['#e863a5','#a78bfa','#60a5fa','#4ecdc4','#f59e0b','#f472b6','#34d399'];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    function createSparkle() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 3 + 1,
        speedY: Math.random() * 0.3 + 0.1,
        speedX: (Math.random() - 0.5) * 0.3,
        opacity: Math.random() * 0.7 + 0.3,
        color: colors[Math.floor(Math.random() * colors.length)],
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.02 + 0.01
      };
    }

    // Init sparkles
    for (let i = 0; i < 60; i++) sparkles.push(createSparkle());

    function drawSparkle(s) {
      const currentOpacity = s.opacity * (0.5 + 0.5 * Math.sin(s.pulse));
      ctx.save();
      ctx.globalAlpha = currentOpacity;
      ctx.fillStyle = s.color;
      ctx.shadowColor = s.color;
      ctx.shadowBlur = s.size * 3;

      // Draw a 4-point star
      ctx.beginPath();
      const spikes = 4;
      const outerR = s.size * 2;
      const innerR = s.size * 0.8;
      for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI) / spikes - Math.PI / 2;
        const px = s.x + Math.cos(angle) * r;
        const py = s.y + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      sparkles.forEach(s => {
        s.y -= s.speedY;
        s.x += s.speedX;
        s.pulse += s.pulseSpeed;
        if (s.y < -10) { s.y = canvas.height + 10; s.x = Math.random() * canvas.width; }
        if (s.x < -10) s.x = canvas.width + 10;
        if (s.x > canvas.width + 10) s.x = -10;
        drawSparkle(s);
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
