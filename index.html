<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
    .hub-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px;
      padding: 32px 24px; text-align: center; cursor: pointer; transition: all 0.3s;
      text-decoration: none; color: var(--text); position: relative; overflow: hidden;
    }
    .hub-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
    .hub-card:nth-child(1)::before { background: var(--gradient-pink); }
    .hub-card:nth-child(2)::before { background: linear-gradient(135deg, #10b981, #8b5cf6); }
    .hub-card:nth-child(3)::before { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .hub-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); }
    .hub-card .hub-emoji { font-size: 48px; margin-bottom: 12px; }
    .hub-card .hub-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .hub-card .hub-desc { font-size: 13px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div style="text-align:center;margin-bottom:8px">
    <h1>&#x2728; Home Hub</h1>
    <p class="subtitle">Everything in one place. Tap to open.</p>
  </div>

  <div class="hub-grid">
    <a href="bills.html" class="hub-card">
      <div class="hub-emoji">&#x1F4B0;</div>
      <div class="hub-title">Bill Tracker</div>
      <div class="hub-desc">Bills, balances, forecasts, payday countdown</div>
    </a>
    <a href="chores.html" class="hub-card">
      <div class="hub-emoji">&#x1F9F9;</div>
      <div class="hub-title">Chore Tracker</div>
      <div class="hub-desc">Cleaning schedule, assignments, streaks</div>
    </a>
    <a href="meals.html" class="hub-card">
      <div class="hub-emoji">&#x1F372;</div>
      <div class="hub-title">Meal Planner</div>
      <div class="hub-desc">Weekly meals, grocery list, pantry, recipes</div>
    </a>
    <a href="chores.html#supplies" class="hub-card">
      <div class="hub-emoji">&#x1F9F4;</div>
      <div class="hub-title">Supplies</div>
      <div class="hub-desc">Stock levels, reorder alerts, shopping links</div>
    </a>
  </div>
</body>
</html>
