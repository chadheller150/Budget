<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav style="margin-bottom:12px;display:flex;gap:8px;font-size:12px;font-weight:600">
    <a href="index.html" style="color:var(--accent);text-decoration:none">&#x2190; Home</a>
    <span style="color:var(--text-secondary)">|</span>
    <a href="chores.html" style="color:var(--text-secondary);text-decoration:none">Chores</a>
  </nav>
  <div class="header-row">
    <h1>&#x2728; Bill Tracker</h1>
    <div class="header-actions">
      <span id="syncStatus"></span>
      <button class="sync-btn" id="syncBtn">&#x1F504; Sync</button>
      <button class="add-btn" id="addBillBtn">+ Add Bill</button>
    </div>
  </div>
  <p class="subtitle">Tap cards for details. Summary cards filter. Everything syncs across devices.</p>

  <div id="summary" class="summary-row"></div>

  <!-- Insights Panel -->
  <div id="insightsPanel" class="insights-panel"></div>

  <!-- Charts Section -->
  <div class="charts-section">
    <div class="chart-card">
      <h3>&#x1F4CA; Spending by Category</h3>
      <canvas id="categoryChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>&#x1F4C8; Monthly Forecast</h3>
      <canvas id="forecastChart"></canvas>
    </div>
  </div>

  <div id="filters"></div>
  <div id="billCards" class="bill-grid"></div>

  <p class="footer-note">
    &#x1F512; Synced via cloud &mdash; same data on all devices. <a href="#" id="resetLink">Reset to defaults</a>
  </p>

  <!-- Edit Modal -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle">Edit Bill</h2>
      <div class="modal-grid">
        <div class="span-2">
          <label for="editName">Bill Name</label>
          <input id="editName" type="text" placeholder="e.g. Netflix">
        </div>
        <div>
          <label for="editAmount">Actual Amount ($)</label>
          <input id="editAmount" type="number" step="0.01" placeholder="0.00">
        </div>
        <div>
          <label for="editEstimated">Estimated Amount ($)</label>
          <input id="editEstimated" type="number" step="0.01" placeholder="0.00">
        </div>
        <div>
          <label for="editDue">Due Date (day)</label>
          <input id="editDue" type="number" min="1" max="31" placeholder="1-31">
        </div>
        <div>
          <label for="editCategory">Category</label>
          <select id="editCategory">
            <option>Housing</option><option>Transport</option><option>Subscriptions</option>
            <option>Financing</option><option>Pet</option><option>Essentials</option><option>Savings</option>
          </select>
        </div>
        <div>
          <label for="editOwner">Owner</label>
          <select id="editOwner">
            <option value="Solo">Chad (Solo)</option>
            <option value="E Solo">Eric (Solo)</option>
            <option value="Joint">Joint</option>
          </select>
        </div>
        <div>
          <label for="editFrequency">Frequency</label>
          <select id="editFrequency">
            <option value="monthly">Monthly</option>
            <option value="biweekly">Bi-Weekly</option>
            <option value="weekly">Weekly</option>
            <option value="quarterly">Quarterly</option>
            <option value="annually">Annually</option>
            <option value="one-time">One-Time</option>
          </select>
        </div>
        <div>
          <label for="editAutopay">Auto-Pay</label>
          <select id="editAutopay">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
        <div>
          <label for="editChad">Chad's Share ($)</label>
          <input id="editChad" type="number" step="0.01" placeholder="0.00">
        </div>
        <div>
          <label for="editEric">Eric's Share ($)</label>
          <input id="editEric" type="number" step="0.01" placeholder="0.00">
        </div>
        <div class="span-2">
          <label for="editSplit">Split Label</label>
          <input id="editSplit" type="text" placeholder="e.g. $100/$100">
        </div>
      </div>
      <hr class="modal-divider">
      <div class="modal-section-label">&#x1F4AB; Payment and Login</div>
      <div class="modal-grid">
        <div class="span-2">
          <label for="editUrl">Payment URL</label>
          <input id="editUrl" type="url" placeholder="https://...">
        </div>
        <div>
          <label for="editUsername">Username / Email</label>
          <input id="editUsername" type="text" placeholder="your@email.com">
        </div>
        <div>
          <label for="editPassword">Password</label>
          <input id="editPassword" type="password" placeholder="password">
        </div>
        <div class="span-2">
          <label for="editNotes">Notes</label>
          <input id="editNotes" type="text" placeholder="Any extra info...">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancelBtn">Cancel</button>
        <button class="btn-save" id="modalSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div id="historyModal" class="modal-overlay">
    <div class="modal" style="max-width:440px">
      <h2 id="historyModalTitle">Payment History</h2>
      <div id="historyEntries"></div>
      <hr class="modal-divider">
      <div class="modal-section-label">&#x2795; Add Payment</div>
      <div class="modal-grid" style="margin-top:8px">
        <div>
          <label for="historyDate">Month (YYYY-MM)</label>
          <input id="historyDate" type="month">
        </div>
        <div>
          <label for="historyAmount">Amount ($)</label>
          <input id="historyAmount" type="number" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="historyCloseBtn">Close</button>
        <button class="btn-save" id="historyAddBtn">Add Entry</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
